<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Centro de Notificaciones</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      padding: 24px;
    }
    .card {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    h1 { margin-top: 0; }

    label { font-weight: bold; display: block; margin-top: 10px; }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary { background: #2563eb; color: white; }
    .secondary { background: #e5e7eb; }

    pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Centro de Notificaciones</h1>

  <p>
    Esta pantalla permite enviar notificaciones agregando funcionalidades extra
    como <b>urgencia</b> o <b>formato especial</b> usando el patrón Decorator.
  </p>

  <label>Mensaje base</label>
  <textarea id="message"></textarea>

  <label>Agregar decoradores</label>
  <select id="decorator">
    <option value="none">Sin decorador</option>
    <option value="urgent">Urgente</option>
    <option value="format">Formato especial</option>
    <option value="all">Urgente + Formato</option>
  </select>

  <button class="primary" onclick="sendNotification()">Enviar Notificación</button>
  <button class="secondary" onclick="loadExample()">Cargar ejemplo</button>

  <h3>Respuesta</h3>
  <pre id="output">Sin ejecutar</pre>
</div>

<script>
const API_URL = "http://localhost:8080/api/decorator/notify";

function loadExample() {
  document.getElementById("message").value = "Paciente con temperatura alta";
}

async function sendNotification() {
  const output = document.getElementById("output");
  output.textContent = "Enviando...";

  const payload = {
    message: document.getElementById("message").value,
    decorator: document.getElementById("decorator").value
  };

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    output.textContent = JSON.stringify(data, null, 2);

  } catch (e) {
    output.textContent = "Error: " + e.message;
  }
}
</script>

</body>
</html>
