<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Prescripciones</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      padding: 24px;
    }
    .card {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    h1 { margin-top: 0; }

    label { font-weight: bold; display: block; margin-top: 10px; }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary { background: #2563eb; color: white; }
    .secondary { background: #e5e7eb; }

    pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Gestión de Prescripciones</h1>

  <p>
    Esta pantalla utiliza el patrón <b>Facade</b> para simplificar la creación de una prescripción.
    El sistema maneja internamente toda la lógica (builder, alertas, repositorios), pero el frontend solo hace una petición sencilla.
  </p>

  <label>ID del paciente</label>
  <input id="patientId" />

  <label>Nombre del medicamento</label>
  <input id="medicationName" />

  <label>Dosis</label>
  <input id="dose" />

  <label>Frecuencia</label>
  <input id="frequency" />

  <button class="primary" onclick="createPrescription()">Crear Prescripción</button>
  <button class="secondary" onclick="loadExample()">Cargar ejemplo</button>

  <h3>Respuesta</h3>
  <pre id="output">Sin ejecutar</pre>
</div>

<script>
const API_URL = "http://localhost:8080/api/facade/prescriptions";

function loadExample() {
  document.getElementById("patientId").value = "ee7ee567-1885-4e78-80eb-642ed9ab23ad";
  document.getElementById("medicationName").value = "Aspirin";
  document.getElementById("dose").value = "100mg";
  document.getElementById("frequency").value = "daily";
}

async function createPrescription() {
  const output = document.getElementById("output");
  output.textContent = "Enviando...";

  const payload = {
    patientId: document.getElementById("patientId").value,
    medicationName: document.getElementById("medicationName").value,
    dose: document.getElementById("dose").value,
    frequency: document.getElementById("frequency").value
  };

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    output.textContent = JSON.stringify(data, null, 2);

  } catch (e) {
    output.textContent = "Error: " + e.message;
  }
}
</script>

</body>
</html>
